<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QA Capture</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup-body">
  <main class="popup">
    <div class="brand-row">
      <div class="brand-mark">QC</div>
      <div>
        <h1>QA Capture</h1>
        <p>Capture this tab and create a Jira-ready issue.</p>
      </div>
    </div>
    <button id="captureBtn" class="primary full">Capture current tab</button>
    <button id="openLastBtn" class="full">Open last capture</button>
    <button id="settingsBtn" class="full">Settings</button>
    <p id="status" class="status"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
